<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo - Tirage au sort</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        
        <!-- PAGE 1: Formulaire d'inscription -->
        <div id="registration-page" class="page active">
            <h1>Inscrivez-vous au concours</h1>
            <form id="registration-form">
                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" required>
                </div>
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="btn-submit">Valider l'inscription</button>
            </form>
            <p id="confirmation-message" class="hidden">¡Inscrito con éxito!</p>
        </div>

        <!-- PAGE 2: Administration -->
        <div id="admin-page" class="page hidden">
            <h1>Panel de Administración</h1>
            <p class="subtitle">Gestion des participants</p>
            
            <div class="admin-controls">
                <button id="toggle-participants-btn" class="btn-secondary">Voir/Masquer la liste</button>
                <button id="go-to-draw-btn" class="btn-primary">Aller à l'écran de tirage</button>
                <button id="reset-btn" class="btn-danger">Tout effacer</button>
            </div>

            <div id="participants-table-container" class="hidden">
                <h2>Participants (<span id="participant-count">0</span>)</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr><th>#</th><th>Prénom</th><th>Nom</th><th>E-mail</th></tr>
                        </thead>
                        <tbody id="participants-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- PAGE 3: Écran de Tirage (Nouveau) -->
        <div id="draw-page" class="page hidden">
            <div class="draw-header">
                <h1>Tirage au sort</h1>
                <button id="back-to-admin-btn" class="btn-small">Retour Admin</button>
            </div>

            <div class="wheel-scene">
                <div class="wheel-wrapper">
                    <canvas id="wheel" width="500" height="500"></canvas>
                    <div class="pointer"></div>
                </div>
                
                <button id="start-spin-btn" class="btn-huge">LANCER LA ROUE !</button>
            </div>

            <!-- Pop-up Gagnant (Overlay) -->
            <div id="winner-overlay" class="hidden">
                <div class="winner-card">
                    <h2 class="winner-title">El ganador es:</h2>
                    <div class="winner-name-display" id="winner-name"></div>
                    <button id="close-winner-btn" class="btn-secondary">Fermer</button>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
