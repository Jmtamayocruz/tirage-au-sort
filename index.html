<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡ La Ruleta Brilla !</title>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        
        <!-- ZONE 1: FORMULAIRE -->
        <div id="view-form" class="view active">
            <div class="card">
                <h1>Inscription</h1>
                <form id="registration-form">
                    <div class="input-group">
                        <label>Prénom</label>
                        <input type="text" id="prenom" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>Nom</label>
                        <input type="text" id="nom" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="email" required autocomplete="off">
                    </div>
                    <button type="submit">S'inscrire</button>
                </form>
                <div id="success-msg" class="hidden">¡Inscrito con éxito!</div>
                
                <!-- Bouton temporaire pour basculer vers la roue pendant les tests -->
                <button id="debug-go-to-wheel" class="btn-debug">[TEST: Aller à la roue]</button>
            </div>
        </div>

        <!-- ZONE 2: ROUE DE TIRAGE (Entourée d'une .card comme le formulaire) -->
        <div id="view-wheel" class="view hidden">
            <div class="card wheel-card">
                <h1>¡ La ruleta Brilla !</h1>
                
                <div class="wheel-container">
                    <canvas id="wheel-canvas" width="500" height="500"></canvas>
                    <div class="pointer"></div>
                </div>
                
                <button id="btn-spin">LANCER LE TIRAGE</button>
            </div>
        </div>

    </div>

    <!-- POP-UP GAGNANT -->
    <div id="winner-overlay" class="hidden">
        <div class="winner-card">
            <h1 class="winner-title">¡ Y el ganador o ganadora es :</h1>
            <div class="winner-name" id="winner-name-display"></div>
            <p class="winner-subtitle">¡Felicidades!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
