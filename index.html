<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡ La Ruleta Brilla !</title>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        
        <!-- UNIQUEMENT LA VUE ROUE -->
        <div id="view-wheel" class="view active">
            <div class="card wheel-card">
                <h1>¡ La ruleta Brilla !</h1>
                
                <div class="wheel-container">
                    <canvas id="wheel-canvas" width="500" height="500"></canvas>
                    <div class="pointer"></div>
                </div>
                
                <button id="btn-spin">LANCER LE TIRAGE</button>
                <div id="status-db" style="margin-top:15px; font-size:0.9em; color:#800020; font-weight:bold;">
                    Connexion à la base de données...
                </div>
            </div>
        </div>

    </div>

    <!-- POP-UP GAGNANT -->
    <div id="winner-overlay" class="hidden">
        <div class="winner-card">
            <h1 class="winner-title">¡ Y el ganador o ganadora es :</h1>
            <div class="winner-name" id="winner-name-display"></div>
            <p class="winner-subtitle">¡Felicidades!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
